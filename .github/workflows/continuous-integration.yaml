name: ⚙️ CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  markdownlint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "**/*.md"

  cargo-quality-checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Install dependencies
        run: cargo build

      - name: Run tests
        run: cargo test

      - name: Run formatter
        run: cargo fmt -- --check

      - name: Run linter
        run: cargo clippy -- -D warnings
